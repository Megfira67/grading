<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <img src="logo.png" class="sidebar-logo">
        <h2>Addis ketema SGS</h2>

        <ul>
            <li>Dashboard</li>
            <li>My Results</li>
            <li>Profile</li>
            <li onclick="printResult()">Print Result</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="main-content">

        <div class="topbar">
            <h1>Welcome Student</h1>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Average</h3>
                <p>84%</p>
            </div>

            <div class="card">
                <h3>Rank</h3>
                <p>1st</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p>Passed</p>
            </div>
        </div>

        <div class="table-section">
            <h2>My Results</h2>

            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>English</td>
                        <td>88</td>
                    </tr>

                    <tr>
                        <td>Mathematics</td>
                        <td>92</td>
                    </tr>

                    <tr>
                        <td>Chemistry</td>
                        <td>85</td>
                    </tr>

                    <tr>
                        <td>Physics</td>
                        <td>81</td>
                    </tr>

                    <tr>
                        <td>Biology</td>
                        <td>79</td>
                    </tr>

                    <tr>
                        <td>Agriculture</td>
                        <td>75</td>
                    </tr>

                    <tr>
                        <td>IT</td>
                        <td>89</td>
                    </tr>

                    <tr>
                        <td>Web Design and Development</td>
                        <td>A</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
